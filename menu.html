<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Menú — The Garnish Bar & Atelier · Mendoza</title>
<meta name="description" content="Carta de coctelería, whiskies y cocina. ES · EN · PT." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#0b241c;
    --green:#0e2b22;
    --green-mid:#15382c;
    --green-soft:#1c4636;
    --gold:#c9a557;
    --gold-bright:#e2c277;
    --gold-deep:#9a7f3f;
    --cream:#f3ead8;
    --cream-mute:#d8cdb4;
    --line:rgba(201,165,87,.35);
    --line-soft:rgba(201,165,87,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--green);
    color:var(--cream);
    font-family:"Cormorant Garamond",Georgia,serif;
    font-size:18px;line-height:1.55;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;
    background:
      radial-gradient(ellipse at 30% 0%,rgba(28,70,54,.5),transparent 60%),
      radial-gradient(ellipse at 70% 100%,rgba(28,70,54,.4),transparent 55%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.78  0 0 0 0 0.65  0 0 0 0 0.34  0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    pointer-events:none;z-index:0;opacity:.85;
  }
  main,header,nav,footer{position:relative;z-index:1}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}

  /* Nav */
  nav.top{
    position:sticky;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 48px;
    background:rgba(11,36,28,.92);
    backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line-soft);
  }
  nav.top a.brand{display:flex;align-items:center;gap:14px;color:var(--cream)}
  nav.top a.brand svg{width:38px;height:38px}
  nav.top a.brand .name{
    font-family:"Cinzel",serif;font-size:12px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--gold);
  }
  nav.top a.back{
    font-family:"Cinzel",serif;font-size:12px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--cream-mute);
    transition:color .3s ease;
    display:inline-flex;align-items:center;gap:8px;
  }
  nav.top a.back:hover{color:var(--gold)}

  /* Header */
  header.menu-head{
    padding:40px 48px 18px;text-align:center;
  }
  header.menu-head .eyebrow{
    font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.32em;
    text-transform:uppercase;color:var(--gold);
    display:inline-flex;align-items:center;gap:12px;
    margin-bottom:14px;
  }
  header.menu-head .eyebrow::before,
  header.menu-head .eyebrow::after{
    content:"";width:28px;height:1px;background:var(--gold);opacity:.6;
  }
  header.menu-head h1{
    font-family:"Cinzel",serif;font-weight:500;
    font-size:clamp(32px,4.5vw,56px);
    color:var(--gold);text-transform:uppercase;letter-spacing:.04em;
    line-height:1;
  }

  /* Language selector */
  .lang-bar{
    display:flex;justify-content:center;
    padding:12px 48px 8px;
  }
  .lang-group{
    display:inline-flex;border:1px solid var(--gold);
    background:rgba(11,36,28,.7);
  }
  .lang-btn{
    font-family:"Cinzel",serif;font-size:12px;letter-spacing:.24em;
    text-transform:uppercase;font-weight:500;
    background:transparent;color:var(--cream-mute);
    border:none;
    padding:12px 28px;
    transition:all .3s ease;
    border-right:1px solid var(--line-soft);
    display:inline-flex;align-items:center;gap:10px;
  }
  .lang-btn:last-child{border-right:none}
  .lang-btn:hover{color:var(--gold);background:rgba(201,165,87,.05)}
  .lang-btn.active{
    background:var(--gold);color:var(--green-deep);
  }
  .lang-btn .flag{
    font-family:"JetBrains Mono",monospace;font-size:10px;
    letter-spacing:.1em;opacity:.6;
  }
  .lang-btn.active .flag{opacity:.8}

  /* ============== FLIPBOOK ============== */
  .book-stage{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px 24px 40px;
    perspective:2400px;
  }

  /* Two-page spread on desktop, single page on mobile */
  .book{
    position:relative;
    width:min(96vw, 1100px);
    aspect-ratio:1414/1000;       /* two A4 pages side by side */
    transform-style:preserve-3d;
    user-select:none;
  }

  .book .spine{
    position:absolute;
    top:0;bottom:0;left:50%;width:1px;
    background:linear-gradient(180deg,transparent,rgba(0,0,0,.45),transparent);
    z-index:5;pointer-events:none;
  }

  .page{
    position:absolute;
    top:0;left:0;width:50%;height:100%;
    overflow:hidden;
    background:var(--green-mid);
    box-shadow:0 12px 30px rgba(0,0,0,.45);
  }
  .page.left{left:0}
  .page.right{left:50%}

  .page img{
    display:block;
    width:100%;height:100%;
    object-fit:cover;
    pointer-events:none;
  }

  /* Subtle gradient near spine to fake book curvature */
  .page.left::after,
  .page.right::after{
    content:"";position:absolute;top:0;bottom:0;width:60px;
    pointer-events:none;
    z-index:2;
  }
  .page.left::after{
    right:0;
    background:linear-gradient(90deg,transparent,rgba(0,0,0,.22));
  }
  .page.right::after{
    left:0;
    background:linear-gradient(-90deg,transparent,rgba(0,0,0,.22));
  }

  /* Animation overlays for page flip */
  .flipper{
    position:absolute;top:0;height:100%;width:50%;
    transform-style:preserve-3d;
    z-index:10;
    pointer-events:none;
  }
  .flipper.from-right{left:50%;transform-origin:left center}
  .flipper.from-left{left:0;transform-origin:right center}
  .flipper .face{
    position:absolute;inset:0;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    overflow:hidden;
    background:var(--green-mid);
    box-shadow:0 12px 30px rgba(0,0,0,.45);
  }
  .flipper .face img{
    position:absolute;top:0;height:100%;
    width:200%;
    object-fit:cover;
    pointer-events:none;
  }
  .flipper.from-right .face.front img{left:-100%}
  .flipper.from-right .face.back{transform:rotateY(180deg)}
  .flipper.from-right .face.back img{left:0;transform:scaleX(-1)}
  .flipper.from-left .face.front img{left:0}
  .flipper.from-left .face.back{transform:rotateY(180deg)}
  .flipper.from-left .face.back img{left:-100%;transform:scaleX(-1)}

  /* Outer frame around the whole book */
  .book-frame{
    position:relative;
    padding:18px;
    border:1px solid var(--gold);
    background:var(--green-deep);
    box-shadow:
      0 40px 80px -30px rgba(0,0,0,.7),
      0 10px 30px rgba(0,0,0,.4);
  }
  .book-frame::before{
    content:"";position:absolute;inset:8px;
    border:1px solid var(--line-soft);
    pointer-events:none;z-index:6;
  }
  .book-frame .corner{position:absolute;width:18px;height:18px;border:1px solid var(--gold);z-index:7}
  .book-frame .corner.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .book-frame .corner.tr{top:-1px;right:-1px;border-left:0;border-bottom:0}
  .book-frame .corner.bl{bottom:-1px;left:-1px;border-right:0;border-top:0}
  .book-frame .corner.br{bottom:-1px;right:-1px;border-left:0;border-top:0}

  /* Controls */
  .controls{
    display:flex;align-items:center;justify-content:center;gap:24px;
    margin-top:24px;
    flex-wrap:wrap;
  }
  .ctl-btn{
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:"Cinzel",serif;
    font-size:12px;letter-spacing:.24em;text-transform:uppercase;
    padding:12px 22px;
    transition:all .3s ease;
    display:inline-flex;align-items:center;gap:10px;
    min-width:140px;justify-content:center;
  }
  .ctl-btn:hover:not(:disabled){background:var(--gold);color:var(--green-deep)}
  .ctl-btn:disabled{opacity:.3;cursor:not-allowed}
  .ctl-btn svg{width:14px;height:14px}

  .page-counter{
    font-family:"JetBrains Mono",monospace;
    color:var(--gold);
    font-size:13px;letter-spacing:.22em;text-transform:uppercase;
    padding:0 16px;
    min-width:120px;text-align:center;
    display:inline-flex;align-items:center;gap:10px;
    border-left:1px solid var(--line-soft);
    border-right:1px solid var(--line-soft);
    padding:6px 24px;
  }
  .page-counter .of{color:var(--cream-mute);opacity:.6}

  /* Click zones over the book */
  .book-frame .clickzone{
    position:absolute;top:18px;bottom:18px;width:50%;
    z-index:8;cursor:pointer;background:transparent;border:0;
    transition:background .3s ease;
  }
  .book-frame .clickzone.left{left:18px}
  .book-frame .clickzone.right{right:18px}
  .book-frame .clickzone:hover::before{
    content:"";position:absolute;top:50%;
    transform:translateY(-50%);
    width:44px;height:44px;border-radius:50%;
    background:rgba(11,36,28,.85);
    border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
  }
  .book-frame .clickzone.left:hover::before{left:14px}
  .book-frame .clickzone.right:hover::before{right:14px}
  .book-frame .clickzone:hover::after{
    content:"";position:absolute;top:50%;
    transform:translateY(-50%);
    width:10px;height:10px;
    border-top:2px solid var(--gold);
    border-right:2px solid var(--gold);
  }
  .book-frame .clickzone.left:hover::after{
    left:30px;transform:translateY(-50%) rotate(-135deg);
  }
  .book-frame .clickzone.right:hover::after{
    right:30px;transform:translateY(-50%) rotate(45deg);
  }
  .book-frame .clickzone.disabled{cursor:default;pointer-events:none}

  /* Mobile: single page */
  @media (max-width:760px){
    nav.top{padding:12px 18px}
    header.menu-head{padding:24px 18px 8px}
    .lang-bar{padding:8px 18px}
    .lang-btn{padding:10px 16px;font-size:11px}
    .lang-btn .flag{display:none}
    .book-stage{padding:12px 12px 30px}
    .book-frame{padding:10px}
    .book-frame::before{inset:4px}
    .book{aspect-ratio:707/1000}  /* single A4 */
    .page{width:100%}
    .page.right{display:none}
    .page.left::after{display:none}
    .book .spine{display:none}
    .flipper{width:100%}
    .flipper.from-right{left:0}
    .flipper.from-left{left:0}
    .flipper .face img{width:100%}
    .flipper.from-right .face.front img,
    .flipper.from-left .face.front img{left:0}
    .flipper.from-right .face.back img,
    .flipper.from-left .face.back img{left:0;transform:scaleX(-1)}
    .controls{gap:12px;margin-top:18px}
    .ctl-btn{padding:10px 14px;font-size:11px;min-width:auto;letter-spacing:.18em}
    .ctl-btn span.label{display:none}
    .page-counter{padding:6px 14px;font-size:12px;min-width:90px}
  }

  /* Loading shimmer for images that haven't loaded */
  .page-skeleton{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:
      repeating-linear-gradient(135deg,
        rgba(201,165,87,.06) 0 2px,
        transparent 2px 14px),
      linear-gradient(180deg,var(--green-soft),var(--green-mid));
    color:var(--cream-mute);
    font-family:"JetBrains Mono",monospace;font-size:11px;
    letter-spacing:.2em;text-transform:uppercase;
  }

  /* Footer */
  footer{
    background:#081d16;
    padding:30px 48px;text-align:center;
    border-top:1px solid var(--line-soft);
    color:var(--cream-mute);
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.2em;
    text-transform:uppercase;
  }
  footer a{color:var(--gold);transition:color .3s ease}
  footer a:hover{color:var(--gold-bright)}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">

<nav class="top">
  <a class="brand" href="index.html">
    <svg><use href="#seal"/></svg>
    <span class="name">The Garnish Bar</span>
  </a>
  <a class="back" href="index.html"><svg style="width:14px;height:14px"><use href="#arrow-back"/></svg> Volver</a>
</nav>

<header class="menu-head">
  <div class="eyebrow"><span>La Carta · The Menu · O Cardápio</span></div>
  <h1>Menú</h1>
</header>

<div class="lang-bar">
  <div class="lang-group" role="tablist" aria-label="Idioma">
    <button class="lang-btn active" data-lang="es" role="tab" aria-selected="true">
      <span>Español</span><span class="flag">ES</span>
    </button>
    <button class="lang-btn" data-lang="en" role="tab" aria-selected="false">
      <span>English</span><span class="flag">EN</span>
    </button>
    <button class="lang-btn" data-lang="pt" role="tab" aria-selected="false">
      <span>Português</span><span class="flag">PT</span>
    </button>
  </div>
</div>

<main class="book-stage">
  <div class="book-frame">
    <span class="corner tl"></span><span class="corner tr"></span>
    <span class="corner bl"></span><span class="corner br"></span>

    <button class="clickzone left" id="zoneLeft" aria-label="Página anterior"></button>
    <button class="clickzone right" id="zoneRight" aria-label="Página siguiente"></button>

    <div class="book" id="book">
      <div class="page left" id="pageLeft">
        <div class="page-skeleton">[ cargando ]</div>
      </div>
      <div class="page right" id="pageRight">
        <div class="page-skeleton">[ cargando ]</div>
      </div>
      <div class="spine"></div>
    </div>
  </div>

  <div class="controls">
    <button class="ctl-btn" id="prevBtn">
      <svg><use href="#arrow-l"/></svg> <span class="label">Anterior</span>
    </button>
    <div class="page-counter">
      <span id="pageNum">01</span>
      <span class="of">/</span>
      <span id="pageTotal">16</span>
    </div>
    <button class="ctl-btn" id="nextBtn">
      <span class="label">Siguiente</span> <svg><use href="#arrow-r"/></svg>
    </button>

<footer>
  <span>© 2026 · The Garnish Bar &amp; Atelier · Mendoza</span>
  &nbsp;·&nbsp;
  <a href="index.html">Volver al inicio</a>
  &nbsp;·&nbsp;
  <a href="https://the-garnish-bar.meitre.com" target="_blank" rel="noopener">Reservar</a>
</footer>

<script>
  // -------------- Config --------------
  const PAGES_PER_LANG = 16;
  const LANGS = {
    es: { dir: 'menus/es', label: 'Menú · Español' },
    en: { dir: 'menus/en', label: 'Menu · English' },
    pt: { dir: 'menus/pt', label: 'Cardápio · Português' }
  };

  // -------------- State --------------
  let currentLang = 'es';
  let leftIdx = 0;   // index of LEFT page currently shown (0-based)
  // We treat spreads as pairs: [0,1], [2,3], [4,5]...
  // index 0 = cover (shown alone on left? we'll just always show pairs)
  // For simplicity: leftIdx is always even, rightIdx = leftIdx + 1
  let isMobile = window.matchMedia('(max-width:760px)').matches;
  let animating = false;

  // -------------- Elements --------------
  const book = document.getElementById('book');
  const pageLeftEl = document.getElementById('pageLeft');
  const pageRightEl = document.getElementById('pageRight');
  const zoneLeft = document.getElementById('zoneLeft');
  const zoneRight = document.getElementById('zoneRight');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const pageNum = document.getElementById('pageNum');
  const pageTotal = document.getElementById('pageTotal');

  // -------------- Helpers --------------
  function pagePath(lang, idx){
    // idx is 1-based human page; clamp to range
    if(idx < 1 || idx > PAGES_PER_LANG) return null;
    const padded = String(idx).padStart(2, '0');
    return `${LANGS[lang].dir}/${padded}.jpg`;
  }

  function setPageImg(el, lang, idx){
    if(idx < 1 || idx > PAGES_PER_LANG){
      el.innerHTML = '';
      el.style.background = 'var(--green-deep)';
      return;
    }
    const src = pagePath(lang, idx);
    el.innerHTML = `<img src="${src}" alt="Página ${idx}" loading="eager" data-retries="0" onerror="retryImg(this)" />`;
  }

  // Auto-retry transient image load failures
  window.retryImg = function(img){
    const n = parseInt(img.dataset.retries||'0',10);
    if(n >= 3) return;
    img.dataset.retries = n + 1;
    const orig = img.src.split('?')[0];
    setTimeout(()=>{ img.src = orig + '?r=' + (n+1); }, 300 * (n+1));
  };

  function renderStatic(){
    isMobile = window.matchMedia('(max-width:760px)').matches;
    if(isMobile){
      // single page
      setPageImg(pageLeftEl, currentLang, leftIdx + 1);
      pageRightEl.innerHTML = '';
    } else {
      // pair
      setPageImg(pageLeftEl, currentLang, leftIdx + 1);
      setPageImg(pageRightEl, currentLang, leftIdx + 2);
    }
    updateUI();
  }

  function updateUI(){
    pageTotal.textContent = String(PAGES_PER_LANG).padStart(2,'0');
    if(isMobile){
      pageNum.textContent = String(leftIdx + 1).padStart(2,'0');
    } else {
      const a = leftIdx + 1;
      const b = Math.min(leftIdx + 2, PAGES_PER_LANG);
      pageNum.textContent = a === b
        ? String(a).padStart(2,'0')
        : `${String(a).padStart(2,'0')}–${String(b).padStart(2,'0')}`;
    }
    const step = isMobile ? 1 : 2;
    const atStart = leftIdx <= 0;
    const atEnd = leftIdx + step >= PAGES_PER_LANG;
    prevBtn.disabled = atStart;
    nextBtn.disabled = atEnd;
    zoneLeft.classList.toggle('disabled', atStart);
    zoneRight.classList.toggle('disabled', atEnd);
  }

  // Preload upcoming images for smoother flips
  function preload(lang, idx){
    if(idx < 1 || idx > PAGES_PER_LANG) return;
    const im = new Image();
    im.src = pagePath(lang, idx);
  }

  // -------------- Page flip animation --------------
  function flip(direction){
    if(animating) return;
    const step = isMobile ? 1 : 2;
    if(direction === 'next' && leftIdx + step >= PAGES_PER_LANG) return;
    if(direction === 'prev' && leftIdx <= 0) return;
    animating = true;

    const nextLeft = direction === 'next' ? leftIdx + step : leftIdx - step;

    // Indices for animation (1-based for img mapping)
    // For desktop (two-page spread):
    //   When NEXT: right page flips from right to left, revealing pages nextLeft+1 (new left) and nextLeft+2 (new right)
    //   When PREV: left page flips from left to right
    // For mobile: single page slide-flip
    const flipper = document.createElement('div');
    flipper.className = 'flipper ' + (direction === 'next' ? 'from-right' : 'from-left');

    let frontIdx, backIdx;
    if(direction === 'next'){
      // front = current right page; back = new left page (which is leftIdx+step+1... wait)
      // Actually: when we flip the right page leftward, its front shows the current right, its back shows the page that comes after current right (= new right's left side? No.)
      // Simplest model: the visible flipping page shows current-right on front, and (nextLeft+1) on back (the new LEFT page that is revealed)
      frontIdx = isMobile ? leftIdx + 1 : leftIdx + 2;
      backIdx = nextLeft + 1;
    } else {
      // PREV: flipping current LEFT page rightward, front = current left, back = new right page (nextLeft+2) or for mobile new page
      frontIdx = leftIdx + 1;
      backIdx = isMobile ? nextLeft + 1 : nextLeft + 2;
    }

    const frontFace = document.createElement('div');
    frontFace.className = 'face front';
    const backFace = document.createElement('div');
    backFace.className = 'face back';

    if(frontIdx >= 1 && frontIdx <= PAGES_PER_LANG){
      frontFace.innerHTML = `<img src="${pagePath(currentLang, frontIdx)}" alt="" />`;
    }
    if(backIdx >= 1 && backIdx <= PAGES_PER_LANG){
      backFace.innerHTML = `<img src="${pagePath(currentLang, backIdx)}" alt="" />`;
    }
    flipper.appendChild(frontFace);
    flipper.appendChild(backFace);
    book.appendChild(flipper);

    // Pre-set the page that won't be covered by the flipper to the new content,
    // so when flipper is removed everything matches.
    if(!isMobile){
      if(direction === 'next'){
        // The flipper covers the RIGHT side. We can update the LEFT side now to be the new LEFT.
        setPageImg(pageLeftEl, currentLang, nextLeft + 1);
      } else {
        // Flipper covers the LEFT side. Update RIGHT to new right.
        setPageImg(pageRightEl, currentLang, nextLeft + 2);
      }
    }

    // Animate
    requestAnimationFrame(() => {
      flipper.style.transition = 'transform .9s cubic-bezier(.4,.0,.2,1)';
      flipper.style.transform = direction === 'next'
        ? 'rotateY(-180deg)'
        : 'rotateY(180deg)';
      // Add a shadow that grows then fades during the flip
      flipper.animate(
        [{ filter:'drop-shadow(0 0 0 rgba(0,0,0,0))' },
         { filter:'drop-shadow(0 25px 40px rgba(0,0,0,.6))', offset:.5 },
         { filter:'drop-shadow(0 0 0 rgba(0,0,0,0))' }],
        { duration:900, easing:'ease-in-out' }
      );
    });

    setTimeout(() => {
      leftIdx = nextLeft;
      // Final render both pages clean
      renderStatic();
      flipper.remove();
      animating = false;
      // Preload neighbors
      const step2 = isMobile ? 1 : 2;
      preload(currentLang, leftIdx + step2 + 1);
      preload(currentLang, leftIdx + step2 + 2);
      preload(currentLang, leftIdx - 1);
    }, 920);
  }

  // -------------- Language switching --------------
  function setLang(lang){
    if(!LANGS[lang]) lang = 'es';
    currentLang = lang;
    leftIdx = 0;
    document.querySelectorAll('.lang-btn').forEach(b=>{
      const on = b.dataset.lang === lang;
      b.classList.toggle('active', on);
      b.setAttribute('aria-selected', on);
    });
    document.documentElement.lang = lang;
    renderStatic();
    // Preload first few pages
    for(let i=1; i<=4; i++) preload(lang, i);
    try{ localStorage.setItem('garnish_lang', lang); }catch(e){}
  }

  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.addEventListener('click', ()=> setLang(b.dataset.lang));
  });

  // -------------- Navigation events --------------
  prevBtn.addEventListener('click', ()=> flip('prev'));
  nextBtn.addEventListener('click', ()=> flip('next'));
  zoneLeft.addEventListener('click', ()=> flip('prev'));
  zoneRight.addEventListener('click', ()=> flip('next'));

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight') flip('next');
    if(e.key === 'ArrowLeft') flip('prev');
  });

  // Swipe support
  let touchStartX = 0;
  book.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, {passive:true});
  book.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if(Math.abs(dx) > 40){
      flip(dx < 0 ? 'next' : 'prev');
    }
  }, {passive:true});

  // Re-render on resize (mobile/desktop switch)
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const wasMobile = isMobile;
      isMobile = window.matchMedia('(max-width:760px)').matches;
      if(wasMobile !== isMobile){
        // Snap to even index when transitioning to desktop
        if(!isMobile && leftIdx % 2 !== 0) leftIdx = leftIdx - 1;
        renderStatic();
      }
    }, 120);
  });

  // -------------- Init --------------
  // Default to ES; respect user's previous choice via localStorage
  let pref = 'es';
  try{
    const stored = localStorage.getItem('garnish_lang');
    if(stored && LANGS[stored]) pref = stored;
  }catch(e){}
  setLang(pref);

  // Block right-click on book (deterrent)
  book.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
